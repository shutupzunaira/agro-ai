{% extends "base.html" %}
{% block title %}Log in — AgriSense{% endblock %}

{% block content %}
<section class="auth-section auth-section--auth">
  <div class="auth-card auth-card--elevated">
    <header class="auth-header">
      <p class="eyebrow eyebrow--auth">Welcome back</p>
      <h1>Log in</h1>
      <p>Access your dashboard, saved readings, and AI tools.</p>
    </header>

    <form class="auth-form" method="post" action="{{ url_for('auth.login') }}">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" autocomplete="email" required placeholder="you@farm.example">
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required placeholder="••••••••">
      </div>
      <label class="checkbox-label">
        <input type="checkbox" name="remember" value="1">
        <span>Keep me signed in on this device</span>
      </label>
      <button type="submit" class="btn btn--primary btn--full btn--lg">Log in</button>
    </form>

    <p class="auth-switch">
      New here?
      <a href="{{ url_for('auth.register') }}">Create an account</a>
    </p>
  </div>
</section>
{% endblock %}
